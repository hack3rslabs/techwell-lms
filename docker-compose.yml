version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: techwell_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin_password_change_me
      POSTGRES_DB: techwell
    ports:
      - "5433:5432" # Mapping to 5433 to avoid conflicts on host, or change as needed
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - techwell_net

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: techwell_backend
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DATABASE_URL=postgresql://admin:admin_password_change_me@db:5432/techwell?schema=public
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    ports:
      - "5000:5000"
    depends_on:
      - db
    networks:
      - techwell_net

  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    container_name: techwell_frontend
    restart: always
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=https://techwell.co.in/api
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - techwell_net

networks:
  techwell_net:
    driver: bridge

volumes:
  pgdata:
